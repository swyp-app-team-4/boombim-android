name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 1. local.properties 생성
    - name: Create local.properties
      run: touch local.properties

    # 2. google-services.json 복원 (빌드 직전에 수행)
    - name: Decode google-services.json
      run: |
        mkdir -p presentation  # 폴더가 없을 경우에 대비해 생성
        echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > presentation/google-services.json

    # 3. 실제 빌드 수행 (한 번만 실행)
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # 빌드 성공 시 알림
    - name: Slack Notification on Success
      if: success()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_COLOR: '#36a64f' 
        SLACK_TITLE: 'Android Build Success! ✅'
        SLACK_MESSAGE: '박환님, Boombim 앱 빌드 및 테스트가 무사히 완료되었습니다!'
        SLACK_USERNAME: 'GitHub Action Bot'

    # 빌드 실패 시 알림
    - name: Slack Notification on Failure
      if: failure()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_COLOR: '#ff0000' 
        SLACK_TITLE: 'Android Build Failed! ❌'
        SLACK_MESSAGE: '빌드 과정에서 오류가 발생했습니다. 로그를 확인해 주세요!'
        SLACK_USERNAME: 'GitHub Action Bot'
