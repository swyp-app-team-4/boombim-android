name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # [수정] 빌드 전 빈 local.properties 파일을 생성하여 에러를 방지합니다.
    - name: Create local.properties
      run: touch local.properties

    - name: Build with Gradle
      run: ./gradlew build

      # [추가] Secrets에 저장된 Base64 문자열을 다시 파일로 복원합니다.
    - name: Decode google-services.json
      run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > presentation/google-services.json
      # 주의: 로그에 찍힌 경로(/presentation/google-services.json)에 맞춰 경로를 지정하세요.

    - name: Build with Gradle
      run: ./gradlew build

    # 빌드 성공 시 알림
    - name: Slack Notification on Success
      if: success()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_COLOR: '#36a64f' 
        SLACK_TITLE: 'Android Build Success! ✅'
        SLACK_MESSAGE: '박환님, Boombim 앱 빌드 및 테스트가 무사히 완료되었습니다!'
        SLACK_USERNAME: 'GitHub Action Bot'

    # 빌드 실패 시 알림
    - name: Slack Notification on Failure
      if: failure()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_COLOR: '#ff0000' 
        SLACK_TITLE: 'Android Build Failed! ❌'
        SLACK_MESSAGE: '빌드 과정에서 오류가 발생했습니다. 로그를 확인해 주세요!'
        SLACK_USERNAME: 'GitHub Action Bot'
